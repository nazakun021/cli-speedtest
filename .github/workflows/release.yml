name: Release

on:
  push:
    tags:
      - "v*.*.*" # Triggers when you push a tag like v1.0.0

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rust_speedtest
            asset_name: rust_speedtest-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rust_speedtest.exe
            asset_name: rust_speedtest-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rust_speedtest
            asset_name: rust_speedtest-macos-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binaries to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.asset_name }}
          tag: ${{ github.ref }}
          overwrite: true
